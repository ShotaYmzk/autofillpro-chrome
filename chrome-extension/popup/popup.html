<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoFillPro</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header__brand">
      <div class="header__logo">A</div>
      <div class="header__title">AutoFillPro</div>
    </div>
    <button id="settingsBtn" class="icon-btn" title="設定を開く" aria-label="設定">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- Status bar -->
  <div id="statusBar" class="status-bar status-bar--idle">
    <div class="status-bar__dot"></div>
    <span id="statusText">現在のページを確認中...</span>
  </div>

  <!-- Profile selector -->
  <div class="section">
    <div class="section__label">使用するプロフィール</div>
    <div class="profile-selector">
      <select id="profileSelect" class="profile-select"></select>
      <button id="editProfileBtn" class="icon-btn icon-btn--sm" title="プロフィールを編集" aria-label="編集">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Main action buttons -->
  <div class="actions">
    <button id="fillBtn" class="btn btn--primary btn--fill">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 20h9"/>
        <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      自動入力する
    </button>
    <button id="previewBtn" class="btn btn--secondary btn--fill">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      プレビュー確認
    </button>
  </div>

  <!-- Result banner -->
  <div id="resultBanner" class="result-banner" style="display:none">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="resultText"></span>
  </div>

  <!-- Visited pages -->
  <div class="section">
    <div class="section__header">
      <div class="section__label">最近のマイページ</div>
      <button id="clearHistoryBtn" class="text-btn">クリア</button>
    </div>
    <div id="visitedList" class="visited-list">
      <div class="empty-state">閲覧した企業のマイページがここに表示されます</div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <span class="footer__version"></span>
    <a id="openOptionsLink" href="#" class="footer__link">詳細設定</a>
  </footer>

  <script src="../utils/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
